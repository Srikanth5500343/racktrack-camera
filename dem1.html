<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#111;}
video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}

/* The wrapper that rotates */
#ui{
  position:fixed;
  z-index:10;
  background:transparent;
  /* portrait default */
  top:0; left:0;
  width:100vw;
  height:100vh;
}

#ui.ls{
  /* 
    Goal: rotate 90deg CW so portrait phone shows landscape UI.
    
    Step 1: rotate(90deg) around top-left → 
      the box now has its left edge at the top, right edge at the bottom
      visually it sticks out to the right by (height - width)
    Step 2: translate to bring it back on screen.
    
    After rotate(90deg) from top-left:
      visual top-left corner is at screen (0,0) -> moves to screen (0, -W) in rotated space
    
    Correct formula tested on real devices:
      translateY(-100vw) rotate(90deg)
    This means: first rotate, then translate UP by 100vw
    Because in the NEW (rotated) coordinate system, 
    the Y axis points left in the original frame.
  */
  transform-origin: top left;
  transform: rotate(90deg) translateY(-100vw);
  width: 100vh;
  height: 100vw;
}

/* Content inside */
.header{
  position:absolute;top:0;left:0;right:0;
  background:rgba(255,0,0,0.7);
  padding:14px 20px;
  display:flex;justify-content:space-between;align-items:center;
  color:white;font-family:sans-serif;font-size:18px;font-weight:bold;
}
.controls{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,255,0.7);
  padding:16px;
  display:flex;justify-content:center;gap:30px;align-items:center;
}
.toast{
  position:absolute;bottom:100px;left:50%;transform:translateX(-50%);
  background:rgba(0,200,0,0.8);
  padding:12px 20px;border-radius:8px;
  color:white;font-family:sans-serif;font-size:16px;
  white-space:nowrap;
}
.btn{width:60px;height:60px;border-radius:50%;border:none;font-size:24px;cursor:pointer;}
.brec{background:red;color:white;}
.bsm{background:rgba(255,255,255,0.2);color:white;}

#toggleBtn{
  position:fixed;top:10px;right:10px;z-index:100;
  background:#ffcc00;color:#000;border:none;padding:10px 16px;
  font-size:14px;border-radius:6px;cursor:pointer;font-weight:bold;
}
</style>
</head>
<body>
<button id="toggleBtn" onclick="toggle()">ROTATE UI</button>

<div id="ui">
  <div class="header">
    <span>RackTrack</span>
    <span style="color:#ff8">● REC</span>
  </div>
  <div class="toast">Sweep camera LEFT → RIGHT</div>
  <div class="controls">
    <button class="btn bsm">🔄</button>
    <button class="btn brec">■</button>
    <button class="btn bsm">⏸</button>
  </div>
</div>

<script>
let ls=false;
function toggle(){
  ls=!ls;
  document.getElementById('ui').classList.toggle('ls',ls);
  document.getElementById('toggleBtn').textContent=ls?'BACK TO PORTRAIT':'ROTATE UI';
}
</script>
</body>
</html>
